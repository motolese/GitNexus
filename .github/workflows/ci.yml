name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Reusable workflow orchestration ─────────────────────────────────
# Each concern lives in its own workflow file for maintainability:
#   ci-quality.yml       — typecheck (tsc --noEmit)
#   ci-unit-tests.yml    — unit tests with coverage + cross-platform
#   ci-integration.yml   — integration test matrix (3 OS x 4 groups)
#
# Shared setup is DRY via .github/actions/setup-gitnexus composite action.

jobs:
  quality:
    uses: ./.github/workflows/ci-quality.yml
    permissions:
      contents: read

  unit-tests:
    uses: ./.github/workflows/ci-unit-tests.yml
    permissions:
      contents: read
      pull-requests: write

  integration:
    uses: ./.github/workflows/ci-integration.yml
    permissions:
      contents: read

  # ── PR test & coverage report ────────────────────────────────────
  # Downloads coverage artifacts from unit tests and posts a summary
  # comment on the PR with test results and coverage metrics.
  pr-report:
    name: PR Report
    if: always() && github.event_name == 'pull_request'
    needs: [quality, unit-tests, integration]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Checkout (for vitest config)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: gitnexus/vitest.config.ts
          sparse-checkout-cone-mode: false

      - name: Download test reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-reports
          path: reports
        continue-on-error: true

      - name: Build report
        id: report
        shell: bash
        env:
          QUALITY: ${{ needs.quality.result }}
          UNIT: ${{ needs.unit-tests.result }}
          INTEG: ${{ needs.integration.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # ── Locate coverage file (artifact path may vary) ──
          COV_FILE=$(find reports -name "coverage-summary.json" -type f 2>/dev/null | head -1)
          if [ -n "$COV_FILE" ]; then
            STMTS=$(jq -r '.total.statements.pct' "$COV_FILE" 2>/dev/null || echo "N/A")
            BRANCH=$(jq -r '.total.branches.pct' "$COV_FILE" 2>/dev/null || echo "N/A")
            FUNCS=$(jq -r '.total.functions.pct' "$COV_FILE" 2>/dev/null || echo "N/A")
            LINES=$(jq -r '.total.lines.pct' "$COV_FILE" 2>/dev/null || echo "N/A")
            STMTS_COV=$(jq -r '"\(.total.statements.covered)/\(.total.statements.total)"' "$COV_FILE" 2>/dev/null || echo "")
            BRANCH_COV=$(jq -r '"\(.total.branches.covered)/\(.total.branches.total)"' "$COV_FILE" 2>/dev/null || echo "")
            FUNCS_COV=$(jq -r '"\(.total.functions.covered)/\(.total.functions.total)"' "$COV_FILE" 2>/dev/null || echo "")
            LINES_COV=$(jq -r '"\(.total.lines.covered)/\(.total.lines.total)"' "$COV_FILE" 2>/dev/null || echo "")
          else
            STMTS="N/A"; BRANCH="N/A"; FUNCS="N/A"; LINES="N/A"
            STMTS_COV=""; BRANCH_COV=""; FUNCS_COV=""; LINES_COV=""
          fi

          # ── Locate test results ──
          RESULTS_FILE=$(find reports -name "test-results.json" -type f 2>/dev/null | head -1)
          if [ -n "$RESULTS_FILE" ]; then
            TOTAL=$(jq -r '.numTotalTests' "$RESULTS_FILE" 2>/dev/null || echo "N/A")
            PASSED=$(jq -r '.numPassedTests' "$RESULTS_FILE" 2>/dev/null || echo "N/A")
            FAILED=$(jq -r '.numFailedTests' "$RESULTS_FILE" 2>/dev/null || echo "N/A")
            SKIPPED=$(jq -r '.numPendingTests' "$RESULTS_FILE" 2>/dev/null || echo "N/A")
            SUITES=$(jq -r '.numTotalTestSuites' "$RESULTS_FILE" 2>/dev/null || echo "N/A")
            DURATION=$(jq -r '((.testResults | map(.endTime) | max) - (.startTime)) / 1000 | floor' "$RESULTS_FILE" 2>/dev/null || echo "N/A")
          else
            TOTAL="N/A"; PASSED="N/A"; FAILED="N/A"; SKIPPED="N/A"
            SUITES="N/A"; DURATION="N/A"
          fi

          # ── Coverage thresholds (read from vitest.config.ts to stay in sync) ──
          if [ -f gitnexus/vitest.config.ts ]; then
            THRESH_STMTS=$(grep -oP 'statements:\s*\K[0-9]+' gitnexus/vitest.config.ts || echo 0)
            THRESH_BRANCH=$(grep -oP 'branches:\s*\K[0-9]+' gitnexus/vitest.config.ts || echo 0)
            THRESH_FUNCS=$(grep -oP 'functions:\s*\K[0-9]+' gitnexus/vitest.config.ts || echo 0)
            THRESH_LINES=$(grep -oP 'lines:\s*\K[0-9]+' gitnexus/vitest.config.ts || echo 0)
          else
            THRESH_STMTS=0; THRESH_BRANCH=0; THRESH_FUNCS=0; THRESH_LINES=0
          fi

          # ── Status helpers ──
          status_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          cov_bar() {
            local pct=$1 thresh=$2
            if [ "$pct" = "N/A" ]; then echo "—"; return; fi
            local filled
            filled=$(echo "$pct / 5" | bc 2>/dev/null || echo 0)
            # Clamp to [0, 20]
            (( filled < 0 )) && filled=0
            (( filled > 20 )) && filled=20
            local empty=$((20 - filled))
            local bar=""
            for ((i=0; i<filled; i++)); do bar+="█"; done
            for ((i=0; i<empty; i++)); do bar+="░"; done
            if [ "$(echo "$pct >= $thresh" | bc 2>/dev/null)" = "1" ]; then
              echo "🟢 ${bar}"
            else
              echo "🔴 ${bar}"
            fi
          }

          # ── Overall status ──
          if [[ "$QUALITY" == "success" && "$UNIT" == "success" && "$INTEG" == "success" ]]; then
            OVERALL="✅ **All checks passed**"
          else
            OVERALL="❌ **Some checks failed**"
          fi

          # ── Build markdown ──
          {
            echo "body<<GITNEXUS_CI_REPORT_EOF_7f3a"
            echo "## CI Report"
            echo ""
            echo "${OVERALL}"
            echo ""
            echo "### Pipeline Status"
            echo ""
            echo "| Stage | Status | Details |"
            echo "|-------|--------|---------|"
            echo "| $(status_icon "$QUALITY") Typecheck | \`${QUALITY}\` | tsc --noEmit |"
            echo "| $(status_icon "$UNIT") Unit Tests | \`${UNIT}\` | 3 platforms |"
            echo "| $(status_icon "$INTEG") Integration | \`${INTEG}\` | 3 OS × 4 groups = 12 jobs |"
            echo ""

            if [ "$TOTAL" != "N/A" ]; then
              echo "### Test Results"
              echo ""
              if [ "$FAILED" = "0" ]; then
                echo "✅ **${PASSED}** passed"
              else
                echo "❌ **${FAILED}** failed / **${PASSED}** passed"
              fi
              if [ "$SKIPPED" != "0" ]; then
                echo " · ${SKIPPED} skipped"
              fi
              echo " · ${SUITES} suites · ${TOTAL} total"
              if [ "$DURATION" != "N/A" ]; then
                echo " · ⏱️ ${DURATION}s"
              fi
              echo ""
            fi

            if [ "$STMTS" != "N/A" ]; then
              echo "### Code Coverage"
              echo ""
              echo "| Metric | Coverage | Covered | Threshold | Status |"
              echo "|--------|----------|---------|-----------|--------|"
              echo "| Statements | **${STMTS}%** | ${STMTS_COV} | ${THRESH_STMTS}% | $(cov_bar "$STMTS" "$THRESH_STMTS") |"
              echo "| Branches | **${BRANCH}%** | ${BRANCH_COV} | ${THRESH_BRANCH}% | $(cov_bar "$BRANCH" "$THRESH_BRANCH") |"
              echo "| Functions | **${FUNCS}%** | ${FUNCS_COV} | ${THRESH_FUNCS}% | $(cov_bar "$FUNCS" "$THRESH_FUNCS") |"
              echo "| Lines | **${LINES}%** | ${LINES_COV} | ${THRESH_LINES}% | $(cov_bar "$LINES" "$THRESH_LINES") |"
              echo ""
              echo "<details>"
              echo "<summary>Coverage thresholds are auto-ratcheted — they only go up</summary>"
              echo ""
              echo "Vitest \`thresholds.autoUpdate\` bumps the floor whenever local coverage exceeds it."
              echo "CI enforces the current thresholds; developers commit the ratcheted values."
              echo "</details>"
              echo ""
            else
              echo "### Code Coverage"
              echo ""
              echo "⚠️ Coverage data unavailable — check the [unit test job](${RUN_URL}) for details."
              echo ""
            fi

            echo "---"
            echo "<sub>📋 [View full run](${RUN_URL}) · Generated by CI</sub>"
            echo "GITNEXUS_CI_REPORT_EOF_7f3a"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: ci-report
          message: ${{ steps.report.outputs.body }}

  # ── Unified CI gate ──────────────────────────────────────────────
  # Single required check for branch protection.
  ci-status:
    name: CI Gate
    needs: [quality, unit-tests, integration]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check all jobs passed
        shell: bash
        env:
          QUALITY: ${{ needs.quality.result }}
          UNIT: ${{ needs.unit-tests.result }}
          INTEG: ${{ needs.integration.result }}
        run: |
          echo "Quality:     $QUALITY"
          echo "Unit Tests:  $UNIT"
          echo "Integration: $INTEG"
          if [[ "$QUALITY" != "success" ]] ||
             [[ "$UNIT" != "success" ]] ||
             [[ "$INTEG" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
